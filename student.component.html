<div class="container">

  <h1>Student Bio Data Form</h1>

  <form #studentForm="ngForm" (ngSubmit)="saveStudent()">

    <!-- Name -->
    <div class="form-group">

      <label>Name *</label>

      <input
        type="text"
        name="name"
        [(ngModel)]="student.name"
        required
        #name="ngModel"
      >

      <small class="error"
        *ngIf="name.invalid && name.touched">
        Name is required
      </small>

    </div>

    <!-- Age -->
    <div class="form-group">

      <label>Age *</label>

      <input
        type="number"
        name="age"
        [(ngModel)]="student.age"
        required
        #age="ngModel"
      >

      <small class="error"
        *ngIf="age.invalid && age.touched">
        Age is required
      </small>

    </div>

    <!-- Gender -->
    <div class="form-group">

      <label>Gender *</label>

      <select
        name="gender"
        [(ngModel)]="student.gender"
        required
        #gender="ngModel"
      >
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
      </select>

      <small class="error"
        *ngIf="gender.invalid && gender.touched">
        Gender is required
      </small>

    </div>

    <!-- Email -->
    <div class="form-group">

      <label>Email *</label>

      <input
        type="email"
        name="email"
        [(ngModel)]="student.email"
        required
        #email="ngModel"
      >

      <small class="error"
        *ngIf="email.invalid && email.touched">
        Valid Email is required
      </small>

    </div>

    <!-- Phone -->
    <div class="form-group">

      <label>Phone Number</label>

      <input
        type="text"
        name="phone"
        [(ngModel)]="student.phone"
      >

    </div>

    <!-- Address -->
    <div class="form-group">

      <label>Address</label>

      <textarea
        name="address"
        [(ngModel)]="student.address">
      </textarea>

    </div>

    <!-- Button -->
    <button
      type="submit"
      [disabled]="studentForm.invalid">

      {{ editIndex === null ? 'Save' : 'Update' }}

    </button>

  </form>

  <hr>

  <h2>Student Data Table</h2>

  <table *ngIf="students.length > 0">

    <thead>

      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Action</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let s of students; let i = index">

        <td>{{ s.name }}</td>
        <td>{{ s.age }}</td>
        <td>{{ s.gender }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.phone }}</td>
        <td>{{ s.address }}</td>

        <td>

          <button (click)="editStudent(i)">
            Edit
          </button>

          <button (click)="deleteStudent(i)">
            Delete
          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
